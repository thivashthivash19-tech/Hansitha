<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanisitha Prompts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide"></script>
</head>
<body class="bg-gray-50">

    <!-- LOGIN / SIGNUP PAGE (Default - Show this first) -->
    <div id="auth-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">Hanisitha Prompts</h2>
            <div class="space-y-4">
                <input type="email" placeholder="Email" class="w-full p-3 rounded-xl border border-gray-200">
                <input type="password" placeholder="Password" class="w-full p-3 rounded-xl border border-gray-200">
                <button class="w-full bg-indigo-600 text-white p-3 rounded-xl font-semibold">Sign In</button>
                <p class="text-sm text-center text-gray-500">Don't have an account? <button class="text-indigo-600 font-bold">Sign Up</button></p>
            </div>
        </div>
    </div>

    <!-- MAIN GALLERY PAGE (Hidden by default) -->
    <div id="main-content" class="hidden">
        <nav class="flex justify-between items-center p-4 bg-white shadow-sm sticky top-0 z-50">
            <h1 class="text-xl font-bold text-indigo-600">Hanisitha Prompts</h1>
            <div class="flex gap-4">
                <a href="wishlist.html"><i data-lucide="heart" class="w-6 h-6"></i></a>
                <a href="profile.html"><i data-lucide="user" class="w-6 h-6"></i></a>
            </div>
        </nav>
        
        <main class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Example Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba" class="w-full h-60 object-cover rounded-xl" alt="Prompt">
                <div class="mt-4">
                    <p class="text-sm text-gray-600 mb-4">Cyberpunk neon city concept...</p>
                    <div class="flex justify-between items-center">
                        <button class="flex items-center gap-1 text-gray-500"><i data-lucide="heart" class="w-5 h-5"></i> 120</button>
                        <div class="flex gap-2">
                            <button class="p-2 bg-gray-100 rounded-lg"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Simple script to toggle between Login and Gallery (Replace with Firebase Logic later)
        function toggleView() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
