<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanisitha Prompts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // Firebase Config (Update this!)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "website-ec4a7.firebaseapp.com",
            projectId: "website-ec4a7",
            storageBucket: "website-ec4a7.firebasestorage.app",
            messagingSenderId: "986239734596",
            appId: "1:986239734596:web:7fbeb7706bfc00974ebd11"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Logic
        const authPage = document.getElementById('auth-page');
        const mainContent = document.getElementById('main-content');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authPage.classList.add('hidden');
                mainContent.classList.remove('hidden');
            } else {
                authPage.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        });

        window.handleAuth = async (isSignup) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isSignup) await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
            } catch (err) { alert(err.message); }
        };
    </script>
</head>
<body class="bg-gray-50">

    <div id="auth-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">Hanisitha Prompts</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded-xl border border-gray-200">
                <input id="password" type="password" placeholder="Password" class="w-full p-3 rounded-xl border border-gray-200">
                <button onclick="handleAuth(false)" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-semibold">Sign In</button>
                <p class="text-sm text-center text-gray-500">New here? <button onclick="handleAuth(true)" class="text-indigo-600 font-bold">Sign Up</button></p>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav class="flex justify-between items-center p-4 bg-white shadow-sm sticky top-0 z-50">
            <h1 class="text-xl font-bold text-indigo-600">Hanisitha Prompts</h1>
            <div class="flex gap-4">
                <a href="wishlist.html"><i data-lucide="heart" class="w-6 h-6"></i></a>
                <a href="profile.html"><i data-lucide="user" class="w-6 h-6"></i></a>
            </div>
        </nav>
        <main class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba" class="w-full h-60 object-cover rounded-xl" alt="Prompt">
                <div class="mt-4">
                    <p class="text-sm text-gray-600 mb-4">Cyberpunk neon city concept...</p>
                    <button class="flex items-center gap-1 text-gray-500"><i data-lucide="heart" class="w-5 h-5"></i> 120</button>
                </div>
            </div>
        </main>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
