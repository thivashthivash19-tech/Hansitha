<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanisitha Prompts | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide"></script>
</head>
<body class="bg-gray-50 pb-20">

    <!-- NAVIGATION HEADER -->
    <nav class="bg-white px-6 py-6 shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-indigo-600">Hanisitha Prompts</h1>
            <a href="admin.html" class="bg-indigo-100 p-2 rounded-full text-indigo-600">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </a>
        </div>
        <!-- SEARCH BOX -->
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
            <input type="text" placeholder="Search prompts..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
    </nav>

    <!-- MAIN GALLERY -->
    <main class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Card 1 -->
        <a href="details.html" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 block hover:shadow-md transition">
            <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba" class="w-full h-60 object-cover rounded-xl" alt="Prompt">
            <p class="mt-3 text-sm font-medium text-gray-700">Cyberpunk neon city concept</p>
        </a>
        <!-- Card 2 -->
        <a href="details.html" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 block hover:shadow-md transition">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="w-full h-60 object-cover rounded-xl" alt="Prompt">
            <p class="mt-3 text-sm font-medium text-gray-700">Mountain landscape</p>
        </a>
    </main>

    <!-- BOTTOM FOOTER (Profile & Wishlist Included) -->
    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around items-center z-50">
        <a href="index.html" class="text-indigo-600 flex flex-col items-center">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Home</span>
        </a>
        <a href="search.html" class="text-gray-400 flex flex-col items-center">
            <i data-lucide="search" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Search</span>
        </a>
        <a href="wishlist.html" class="text-gray-400 flex flex-col items-center">
            <i data-lucide="heart" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Wishlist</span>
        </a>
        <a href="profile.html" class="text-gray-400 flex flex-col items-center">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">Profile</span>
        </a>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
