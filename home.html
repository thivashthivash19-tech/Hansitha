<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanisitha Prompts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide"></script>
</head>
<body class="bg-gray-50 pb-24">

    <nav class="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <h1 class="text-xl font-bold text-indigo-600 tracking-tight">Hanisitha Prompts</h1>
        <a href="admin.html" class="p-2 bg-indigo-50 text-indigo-600 rounded-full"><i data-lucide="plus" class="w-5 h-5"></i></a>
    </nav>

    <header class="px-6 py-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Explore</h2>
        <div class="mt-6 relative">
            <i data-lucide="search" class="absolute left-4 top-4 w-5 h-5 text-gray-400"></i>
            <input type="text" placeholder="Search prompts..." class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-100 shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
    </header>

    <main id="main-gallery" class="px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-white p-3 rounded-3xl shadow-sm border border-gray-100">
            <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba" class="w-full h-64 object-cover rounded-2xl" alt="Prompt">
            <div class="p-2">
                <p class="text-sm text-gray-600 font-medium truncate">Cyberpunk neon city concept</p>
                <div class="flex justify-between items-center mt-4">
                    <button class="flex items-center gap-1 text-gray-400 hover:text-red-500"><i data-lucide="heart" class="w-5 h-5"></i> 120</button>
                    <button class="p-2 bg-gray-50 rounded-xl text-indigo-600"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around items-center z-50">
        <a href="index.html" class="text-indigo-600 flex flex-col items-center"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] mt-1">Home</span></a>
        <a href="search.html" class="text-gray-400 flex flex-col items-center"><i data-lucide="search" class="w-6 h-6"></i><span class="text-[10px] mt-1">Search</span></a>
        <a href="wishlist.html" class="text-gray-400 flex flex-col items-center"><i data-lucide="heart" class="w-6 h-6"></i><span class="text-[10px] mt-1">Wishlist</span></a>
        <a href="profile.html" class="text-gray-400 flex flex-col items-center"><i data-lucide="user" class="w-6 h-6"></i><span class="text-[10px] mt-1">Profile</span></a>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
